<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Form</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
}

.container{
  background:#fff;
  padding:40px;
  width:320px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.container h2{
  text-align:center;
  margin-bottom:20px;
}

.input-group{
  margin-bottom:15px;
}

.input-group label{
  display:block;
  margin-bottom:5px;
  font-size:14px;
}

.input-group input{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
  outline:none;
}

.input-group input:focus{
  border-color:#4facfe;
}

.btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#4facfe;
  color:#fff;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#007bff;
}

.extra{
  text-align:center;
  margin-top:10px;
  font-size:14px;
}

.extra a{
  color:#4facfe;
  text-decoration:none;
}
</style>
</head>
<body>

<div class="container">
  <h2>Login</h2>
  <form>
    <div class="input-group">
      <label>Email</label>
      <input type="email" placeholder="Enter your email" required>
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" placeholder="Enter your password" required>
    </div>

    <button class="btn">Login</button>

    <div class="extra">
      <p>Don't have an account? <a href="#">Register</a></p>
    </div>
  </form>
</div>

</body>
</html>
